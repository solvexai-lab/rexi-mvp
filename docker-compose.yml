version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rexi
      POSTGRES_PASSWORD: rexi_pass
      POSTGRES_DB: rexi_db
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rexi -d rexi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: neo4j/rexi_neo4j_2025
      NEO4J_PLUGINS: '["apoc", "gds"]'
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://rexi:rexi_pass@postgres:5432/rexi_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rexi_neo4j_2025
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=rexi_minio
      - MINIO_SECRET_KEY=rexi_minio_secret
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      minio:
        condition: service_started

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rexi_minio
      MINIO_ROOT_PASSWORD: rexi_minio_secret
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
